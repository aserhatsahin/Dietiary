services:
  postgres:
    image: postgres:18
    container_name: dietiary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dietiary_dev
      POSTGRES_USER: dietiary
      POSTGRES_PASSWORD: dietiary123!
    ports:
      - "5432:5432"
    volumes:
      - dietiary_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dietiary -d dietiary_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dietiary_pgdata:
